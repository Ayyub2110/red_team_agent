#version: '3.8'

# ====================== NETWORKS ======================
networks:
  redteam_net:
    driver: bridge
    internal: true                    # ← THIS IS THE KEY FOR SAFETY
    ipam:
      config:
        - subnet: 172.20.0.0/16       # Private subnet for all containers

# ====================== SERVICES ======================
services:

  attacker:
    build: ./cyber_range/attacker     # Use your attacker Dockerfile
    container_name: redteam-attacker
    networks:
      - redteam_net
    depends_on:
      - dvwa
      - struts_rce
    stdin_open: true
    tty: true
    # Security hardening
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: false                  # false for now because tools need to write logs

  # Vulnerable Target 1 - DVWA (Damn Vulnerable Web Application)
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: redteam-dvwa
    networks:
      - redteam_net
    # NO ports: section → completely hidden from your host

  # Vulnerable Target 2 - Apache Struts RCE example
  struts_rce:
    build: ./cyber_range/struts_rce
    container_name: redteam-struts
    networks:
      - redteam_net

  # You can add more targets (e.g. vulns_ssh) later with the same pattern
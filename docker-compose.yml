services:
  attacker:
    build: ./cyber_range/attacker
    container_name: redteam-attacker
    networks:
      - redteam_net
    stdin_open: true
    tty: true
    user: "0:0"                       # Run as root temporarily (for installation)
    security_opt:
      - no-new-privileges:false       # Allow sudo and privilege changes
    cap_drop: []                      # Remove restrictions temporarily

  # Vulnerable Target 1 - DVWA
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: redteam-dvwa
    networks:
      - redteam_net

  # Vulnerable Target 2 - Apache Struts RCE
  struts_rce:
    build: ./cyber_range/struts_rce
    container_name: redteam-struts
    networks:
      - redteam_net

networks:
  redteam_net:
    driver: bridge
    internal: true                    # Critical for safety - blocks internet
    name: redteam_net                 # Clean network name
    ipam:
      config:
        - subnet: 172.20.0.0/16